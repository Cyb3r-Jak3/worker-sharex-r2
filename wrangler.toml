name = "sharex-r2"
compatibility_date = "2022-04-22"
main = "./dist/index.mjs"
account_id = "8be772befd147a8df540aae0fa15c047"
workers_dev = false
logpush = false
upload_source_maps = true
preview_urls = false
send_metrics = false
routes = [
	{pattern = "r2-sharex.cyberjake.xyz", custom_domain = true},
]

analytics_engine_datasets = [
    {binding = "AE", dataset = "r2-sharex"}
]


[[r2_buckets]]
bucket_name = "sharex-files"
preview_bucket_name = "sharex-files"
binding = "R2_BUCKET"

[build]
command = "pnpm run build"


[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
destinations = [ "rackspace-loki"]

[observability.traces]
enabled = true
destinations = [ "rackspace-tempo" ]
persist = true
head_sampling_rate = 1