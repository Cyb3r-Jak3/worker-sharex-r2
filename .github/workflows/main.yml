name: Build
on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:
  repository_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # always run in pull request, or repository_dispatch
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@65d868f8d4d85d7d4abb7de0875cde3fcc8798f5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
      - run: pnpm run lint

      - name: Publish
      # only publish if a direct `push`/`repository_dispatch`
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        if: github.event_name == 'repository_dispatch' || startsWith(github.ref, 'refs/tags/v')
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
          secrets: |
            AUTH_KEY
        env:
          NODE_ENV: production
          AUTH_KEY: ${{ secrets.AUTH_KEY }}